sonar.projectKey=onabhani_Simple-HR-Suite
sonar.organization=onabhani

sonar.sources=includes,hr-suite.php,uninstall.php
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# ──────────────────────────────────────────────────────────────────────
# Copy-paste detector (CPD) exclusions.
#
# Thin REST controllers in WordPress follow an inherently repetitive
# shape: register_rest_route(...) blocks and one-line handlers that
# delegate to service classes. Refactoring these into generic handlers
# tends to reduce readability and introduce reflection without
# meaningful maintenance benefit.
#
# The Labor_Law strategy classes (per-country) also share structural
# scaffolding because they implement the same abstract contract; this
# is an intentional Strategy pattern.
# ──────────────────────────────────────────────────────────────────────
sonar.cpd.exclusions=\
  includes/Modules/**/Rest/**/*.php,\
  includes/Core/Webhooks/Webhook_Rest.php,\
  includes/Core/ApiKeys/Api_Key_Rest.php,\
  includes/Core/LaborLaw/*_Labor_Law.php

# Exclude vendored / translated / generated assets from analysis
sonar.exclusions=\
  assets/vendor/**,\
  languages/*.json,\
  languages/*.po,\
  languages/*.mo,\
  sql/**,\
  .claude/**
