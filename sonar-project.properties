sonar.projectKey=onabhani_Simple-HR-Suite
sonar.organization=onabhani

# Copy-paste detector (CPD) exclusions.
#
# Thin REST controllers in WordPress follow an inherently repetitive shape:
# register_rest_route(...) blocks and one-line handlers that delegate to
# service classes. Refactoring these into generic handlers reduces readability
# and introduces reflection without maintenance benefit.
#
# The Labor_Law strategy classes (per-country) also share structural scaffolding
# because they implement the same abstract contract — this is an intentional
# Strategy pattern, not copy-paste.
sonar.cpd.exclusions=includes/Modules/Hiring/Rest/**/*.php,includes/Modules/Leave/Rest/**/*.php,includes/Modules/Training/Rest/**/*.php,includes/Modules/Surveys/Rest/**/*.php,includes/Modules/Reporting/Rest/**/*.php,includes/Modules/Expenses/Rest/**/*.php,includes/Modules/Settlement/Rest/**/*.php,includes/Modules/Automation/Rest/**/*.php,includes/Modules/Employees/Rest/**/*.php,includes/Modules/Documents/Rest/**/*.php,includes/Modules/Attendance/Rest/**/*.php,includes/Modules/Resignation/Rest/**/*.php,includes/Modules/Performance/Rest/**/*.php,includes/Core/Webhooks/Webhook_Rest.php,includes/Core/ApiKeys/Api_Key_Rest.php,includes/Core/LaborLaw/*_Labor_Law.php

# Exclusions from all analysis (vendored / translated / generated)
sonar.exclusions=assets/vendor/**,languages/*.json,languages/*.po,languages/*.mo,sql/**,.claude/**
